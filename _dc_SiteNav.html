      const cta = document.querySelector('[data-nav-cta]');
      if (cta) { cta.style.color = c; cta.style.borderColor = solid ? '#1C1712' : 'rgba(246,235,217,0.6)'; }
      const ham = document.querySelector('[data-hamburger]');
      if (ham) ham.style.color = c;
      const lc = document.querySelector('[data-logo-cream]');
      const li = document.querySelector('[data-logo-ink]');
      if (lc && li) { lc.style.display = solid ? 'none' : 'block'; li.style.display = solid ? 'block' : 'none'; }
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    this._onScroll = onScroll;

    if (window.matchMedia('(pointer:fine)').matches && !reduce && !window.__nnCursor) {
      window.__nnCursor = true;
      const ring = document.createElement('div');
      ring.style.cssText = 'position:fixed;top:0;left:0;width:30px;height:30px;border:1px solid rgba(169,132,70,0.85);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .28s cubic-bezier(.22,1,.36,1),height .28s cubic-bezier(.22,1,.36,1),background .28s,border-color .28s;';
      document.body.appendChild(ring);
      document.body.style.cursor = 'none';
      let cx = window.innerWidth / 2, cy = window.innerHeight / 2, tx = cx, ty = cy;
      document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
      const loop = () => { cx += (tx - cx) * 0.2; cy += (ty - cy) * 0.2; ring.style.left = cx + 'px'; ring.style.top = cy + 'px'; this._raf = requestAnimationFrame(loop); };
      loop();
      const sel = 'a,button,input,select,textarea,[role=button]';
      document.addEventListener('mouseover', e => { if (e.target.closest && e.target.closest(sel)) { ring.style.width = '54px'; ring.style.height = '54px'; ring.style.background = 'rgba(169,132,70,0.12)'; ring.style.borderColor = 'rgba(169,132,70,0.5)'; } });
      document.addEventListener('mouseout', e => { if (e.target.closest && e.target.closest(sel)) { ring.style.width = '30px'; ring.style.height = '30px'; ring.style.background = 'transparent'; ring.style.borderColor = 'rgba(169,132,70,0.85)'; } });
      this._cursor = ring;
    }
  }

  componentWillUnmount() {
    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);
    if (this._changed) window.removeEventListener('nn-cart-changed', this._changed);
    if (this._raf) cancelAnimationFrame(this._raf);
    if (this._cursor && this._cursor.parentNode) { this._cursor.parentNode.removeChild(this._cursor); window.__nnCursor = false; document.body.style.cursor = ''; }
  }

  renderVals() {
    const count = this.state.count;
    return {
      menuOpen: this.state.menuOpen,
      openMenu: () => this.setState({ menuOpen: true }),
      closeMenu: () => this.setState({ menuOpen: false }),
      countLabel: count > 0 ? '(' + count + ')' : '',
      openCart: () => { this.setState({ menuOpen: false }); window.dispatchEvent(new CustomEvent('nn-cart-open')); }
    };
  }
}
</script>
</body>
</html>
